<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Social links profile</title>

  <link rel="stylesheet" href="style.css">

</head>

<body class="desktop">
  <main>
    <section class="card" aria-labelledby="profile-name">
      <img src="./assets/images/avatar-jessica.jpeg" alt="Portrait of Jessica Randall" class="avatar">
      
      <section class="profile-info">
        <h1 id="profile-name" class="media-username">Jessica Randall</h1>

        <p class="location">London, United Kingdom</p>

        <p class="role">Front-end developer and avid reader.</p>
      </section>

      <nav class="social-links" aria-label="Social links">
        <a class="button" href="#" rel="noopener" aria-label="Jessica's GitHub profile">GitHub</a>
        <a class="button" href="#" rel="noopener" aria-label="Jessica's Frontend Mentor profile">Frontend Mentor</a>
        <a class="button" href="#" rel="noopener" aria-label="Jessica's LinkedIn profile">LinkedIn</a>
        <a class="button" href="#" rel="noopener" aria-label="Jessica's Twitter profile">Twitter</a>
        <a class="button" href="#" rel="noopener" aria-label="Jessica's Instagram profile">Instagram</a>
      </nav>
    </section>
  </main>
</body>
</html>
